# Базовая предустановка конфигурации, используемая на всех серверах Stories Colonial Marines.
# Загружается перед настройками конфигурации, специфичными для сервера.

[game]
hostname         = "📚 Space Stories - Colonial Marines 🌍 [TTS] [ЗБТ]"
desc             = ""
lobbyenabled     = true
lobbyduration    = 180
soft_max_players = 200
map_pool         = "CMDefaultMapPool"

[shuttle]
auto_call_time = 0
emergency      = false
preload_grids  = false

[ic]
flavor_text = true

[viewport]
maximum_width = 26

[net]
tickrate        = 30
max_connections = 1024

[vote]
restart_required_ratio = 0.7

[netres]
limit = 10.0

[admin]
new_player_threshold = 600

[autovote]
enabled = true

[atmos]
space_wind           = false
monstermos_rip_tiles = false
grid_impulse         = false

# [server]
# rules_file = "CM_Rules.txt"
# rules_header = "ui-rules-header-colonial-marines"

# Оптимизция

[gateway]
generator_enabled = false

[procgen]
preload = false
