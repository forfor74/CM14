- type: entity
  name: M20 mine
  description: A modular M20 'Claymore' anti-personnel mine. The front reads 'FRONT TOWARD ENEMY'. Needs a deadly payload before deployment.
  parent: RMCCasingBase
  id: RMCM20MineCasing
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/CustomOrdnance/m20minecasing.rsi
  - type: OrdnanceCasing
    maxVolume: 120
    requiredAssemblyMode: "Mine"
    dualIgniterConeAngle: 120
    maxExplosionPower: 100
    baseFalloff: 80
    minFalloff: 25
    maxFireRadius: 4
    maxFireIntensity: 20
    maxFireDuration: 18
    minFireRadius: 2
    minFireIntensity: 3
    minFireDuration: 3
    maxShards: 40
    useDirection: false
    coneAngle: 90
  - type: RMCLandmine
  - type: StepTrigger
    requiredTriggeredSpeed: 0
  - type: Fixtures
    fixtures:
      trigger:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-1.5,0.25,0"
        hard: false
        layer:
        - Opaque
        mask:
        - MobLayer
      hitbox:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.125,0.25,0.125,0.5"
        hard: false
        layer:
        - XenoProjectileImpassable
  - type: GenericVisualizer
    visuals:
      enum.OrdnanceCasingVisuals.StateId:
        enum.DamageStateVisualLayers.Base:
          icon: { state: icon }
          icon_ass: { state: icon_ass }
          icon_locked: { state: icon_locked }
          icon_active: { state: icon_active }
          icon_sensing: { state: icon_active }

- type: entity
  name: C4 explosive
  description: A sticky polymer explosive designed for directional breaching. Just needs to be filled with chemicals and wired to a detonator.
  parent: RMCCasingBase
  id: RMCC4PlasticCasing
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/CustomOrdnance/c4plasticcasing.rsi
  - type: OrdnanceCasing
    maxVolume: 180
    requiredAssemblyMode: "Plastic"
    signallerDelay: 3.0
    maxExplosionPower: 280
    baseFalloff: 120
    minFalloff: 25
    maxFireRadius: 4
    maxFireIntensity: 50
    maxFireDuration: 20
    minFireRadius: 2
    minFireIntensity: 4
    minFireDuration: 5
    maxShards: 100
  - type: Sticky
    stickDelay: 5
  - type: StickyVisualizer
  - type: RMCExplosiveDelete
    delay: 10
    beepSound:
      path: "/Audio/Effects/beep1.ogg"
      params:
        volume: 4
    initialBeepDelay: 0
    beepInterval: 0.5
    whitelist:
      components:
      - XenoTunnel
  - type: RequiresSkill
    skills:
      RMCSkillEngineer: 1
  - type: GenericVisualizer
    visuals:
      enum.OrdnanceCasingVisuals.StateId:
        enum.DamageStateVisualLayers.Base:
          icon: { state: icon }
          icon_ass: { state: icon_ass }
          icon_locked: { state: icon_locked }
          icon_active: { state: icon_active }
          icon_sensing: { state: icon_sensing }

- type: entity
  parent: BaseItem
  id: RMC88mmRocketTube
  name: 84mm rocket
  description: A rocket projectile. To launch, a warhead must be attached and rocket fuel must be added to the engine compartment.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/CustomOrdnance/84mmrockettube.rsi
    state: icon
  - type: Item
    size: Normal
  - type: OrdnanceCasing
    allowStarShape: false
    maxVolume: 60
    requiredFuelReagent: RMCMethane
    requiredFuelAmount: 60
    addedTags:
    - RMCRocketAmmo84mm
  - type: Ammo
  - type: AssistedReloadAmmo
  - type: Tag
    tags: ["RMCLaunchTube"]
  - type: ItemSlots
    slots:
      warhead_slot:
        name: stories-ordnance-warhead-slot-name
        whitelist:
          tags: ["RMCWarhead88"]
      fuel_slot:
        name: stories-ordnance-fuel-slot-name
        whitelist:
          components: ["FitsInDispenser"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.OrdnanceCasingVisuals.StateId:
        enum.DamageStateVisualLayers.Base:
          icon: { state: icon }
          icon_unlocked: { state: icon_unlocked }
          icon_locked: { state: icon_locked }
          icon_no_fuel: { state: icon_no_fuel }

