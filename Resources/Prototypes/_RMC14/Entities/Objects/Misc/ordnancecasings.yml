- type: Tag
  id: RMCLaunchTube

- type: Tag
  id: RMCWarhead88

- type: Tag
  id: RMCWarhead80

- type: entity
  abstract: true
  parent: BaseItem
  id: RMCCasingBase
  name: ordnance base
  description: A metallic shell waiting to be filled with explosives and fitted with a detonator.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/CustomOrdnance/m40grenadecasing.rsi
    state: icon
  - type: Item
    size: Small
  - type: OrdnanceCasing
    maxVolume: 1000
    baseFalloff: 75
    minFalloff: 25
    maxExplosionPower: 175
    maxShards: 128
    maxFireRadius: 5
    maxFireIntensity: 20
    maxFireDuration: 24
    minFireRadius: 1
    minFireIntensity: 3
    minFireDuration: 3
  - type: CMExplosionEffect
  - type: RMCScorchEffect
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.OrdnanceCasingVisuals.StateId:
        enum.DamageStateVisualLayers.Base:
          icon: { state: icon }
          icon_ass: { state: icon_ass }
          icon_locked: { state: icon_locked }
          icon_active: { state: icon_active }
          icon_sensing: { state: icon_sensing }
          icon_unlocked: { state: icon_unlocked }
          icon_no_fuel: { state: icon_no_fuel }

- type: entity
  name: M40 grenade
  description: A modular M40 grenade. Requires a chemical mixture and a detonator assembly to function.
  parent: RMCCasingBase
  id: RMCM40GrenadeCasing
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/CustomOrdnance/m40grenadecasing.rsi
  - type: Clothing
    quickEquip: false
    slots:
    - Belt
    - suitStorage
  - type: OrdnanceCasing
    maxVolume: 120
    requiredAssemblyMode: "TimerIgniter"
    maxExplosionPower: 180
    baseFalloff: 80
    minFalloff: 25
    maxFireRadius: 5
    maxFireIntensity: 25
    maxFireDuration: 24
    minFireRadius: 1
    minFireIntensity: 3
    minFireDuration: 3
    maxShards: 40
    addedTags:
    - LauncherCompatibleGrenade
    - RMCGrenadeM40
    addedComponents:
    - type: OnUseTimerTrigger
      delay: 4
      beepSound:
        path: "/Audio/_RMC14/Explosion/armbomb.ogg"
        params:
          volume: -5
      initialBeepDelay: 0
      beepInterval: 10
      doPopup: false
  - type: IgnorePredictionHide
  - type: ChangeItemSizeOnTimerTrigger
  - type: CancelUseWithCloak
  - type: CMVocalizeTrigger
  - type: GenericVisualizer
    visuals:
      enum.OrdnanceCasingVisuals.StateId:
        enum.DamageStateVisualLayers.Base:
          icon: { state: icon }
          icon_ass: { state: icon_ass }
          icon_locked: { state: icon_locked }
          icon_active: { state: icon_active }
          icon_sensing: { state: icon_sensing }
          icon_unlocked: { state: icon_unlocked }
          icon_no_fuel: { state: icon_no_fuel }
      enum.Trigger.TriggerVisuals.VisualState:
        enum.ConstructionVisuals.Layer:
          Primed: { state: icon_active }
          Unprimed: { state: icon }

