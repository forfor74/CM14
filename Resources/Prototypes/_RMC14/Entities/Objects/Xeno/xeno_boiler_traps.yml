- type: entity
  abstract: true
  id: BaseXenoBoilerTrap
  name: resin hole
  description: It looks like a trap for catching tallhosts.
  categories: [ HideSpawnMenu ]
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Clickable
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    fixedRotation: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        hard: false
        layer:
        - SlipLayer
        mask:
        - ItemMask
  - type: CollisionWake
    enabled: false
  - type: Sprite
    sprite: _Stories/Effects/xeno_boiler_trap.rsi
    drawdepth: FloorObjects
    state: trap_boiler
  - type: RMCXenoBoilerTrap
  - type: HiveMember

- type: entity
  parent: BaseXenoBoilerTrap
  id: XenoBoilerTrap
  categories: [ HideSpawnMenu ]
  components:
  - type: RMCXenoBoilerTrap
    rootDuration: 1.75
  - type: TimedDespawn
    lifetime: 10

- type: entity
  parent: BaseXenoBoilerTrap
  id: EmpoweredXenoBoilerTrap
  categories: [ HideSpawnMenu ]
  components:
  - type: RMCXenoBoilerTrap
    rootDuration: 3
  - type: TimedDespawn
    lifetime: 10

- type: entity
  abstract: true
  id: BaseXenoAcidMine
  name: ???
  categories: [ HideSpawnMenu ]
  placement:
    mode: SnapgridCenter
    snap:
