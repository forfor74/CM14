- type: entity
  abstract: true
  parent: CMBaseStructureCorrodible
  id: RMCBaseWindowFrame
  name: "window frame"
  description: A big hole in the wall that used to sport a large window. Can be vaulted through.
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    drawdepth: Walls
  - type: PlacementReplacement
    key: walls
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: StaticPrice
    price: 75
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - TableMask
        layer:
        - TableLayer
        density: 1000
  - type: Climbable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 3000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  abstract: true
  parent: CMBaseStructureCorrodible
  id: CMBaseWindow # TODO RMC14 this needs to be 2 separate entities eventually
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    drawdepth: Walls
  - type: PlacementReplacement
    key: walls
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Airtight
  - type: RadiationBlocker
    resistance: 2
  - type: StaticPrice
    price: 75
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 1000
  - type: RMCWallExplosionDeletable

- type: entity
  parent: RMCBaseWindowFrame
  id: RMCWindowFrameReinforcedAlmayer
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/Frames/almayer_frame.rsi
    state: alm_frame0
  - type: Icon
    sprite: _RMC14/Structures/Windows/Frames/almayer_frame.rsi
    state: alm_frame0
  - type: IconSmooth
    key: window
    base: alm_frame
    mode: CardinalFlags

