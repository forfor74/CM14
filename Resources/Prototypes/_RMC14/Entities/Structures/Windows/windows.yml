- type: entity
  parent: CMBaseWindow
  id: CMWindowReinforcedAlmayerHull
  name: hull window
  description: A glass window with a special rod matrix inside a wall frame. This one was made out of exotic materials to prevent hull breaches. No way to get through here.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/almayer_window.rsi
    state: alm_rwindow0
  - type: Icon
    sprite: _RMC14/Structures/Windows/almayer_window.rsi
    state: alm_rwindow0
  - type: IconSmooth
    key: window
    base: alm_rwindow
    mode: CardinalFlags
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 40
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          RMCWindowFrameReinforcedAlmayer:
            min: 1
            max: 1
          CMShardGlass:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]

