- type: entity
  parent: STHunterTrophyLeft
  id: STHunterTrophyRight
  suffix: Right
  components:
  - type: Sprite
    state: hunter_trophy_vendor_right

- type: entity
  parent: RMCPropBase
  id: STHunterArmorProp
  name: ancient yautja armor
  description: An ancient suit of armor. It looks incredibly old, yet most likely still functional, although it's fixed to the wall, and purely used as a ceremonial adornment.
  suffix: 1
  components:
  - type: Sprite
    sprite: _Stories/Structures/Hunter/decor.rsi
    state: hunter_armor_prop

- type: entity
