- type: entity
  parent: RMCPropBase
  id: STHunterTrophyLeft
  name: hunter trophy display rack
  description: A trophy rack for hunters displaying their prizes.
  suffix: Left
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 190
        layer:
        - MobMask
  - type: Sprite
    sprite: _Stories/Structures/Machines/VendingMachines/hunter_vendor.rsi
    offset: 0,0.5
    state: hunter_trophy_vendor_left

