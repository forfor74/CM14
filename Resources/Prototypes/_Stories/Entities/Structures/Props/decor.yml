- type: entity
  parent: RMCPropBase
  id: STHunterThroneTop
  name: throne of the eternal hunt
  description: A grotesquely magnificent seat, carved from the remains of the most formidable prey. Twisted spines, shattered skulls, and serrated bones form a testament to the ancient hunter’s unchallenged supremacy. The throne whispers of countless battles, its macabre elegance a reminder that only the strongest may sit upon it.
  suffix: 1
  components:
  - type: Sprite
    sprite: _Stories/Structures/Hunter/decor.rsi
    state: bone_throne_top

- type: entity
  parent: [STHunterThroneTop, CMSeatBase]
  id: STHunterThrone
  components:
  - type: Sprite
    state: bone_throne

- type: entity
  parent: RMCPropBase
  id: STHunterMachinesBase
  abstract: true
  components:
  - type: Sprite
    sprite: _Stories/Structures/Machinery/hunter_machines.rsi

- type: entity
  parent: STHunterMachinesBase
  id: STHunterConsoleBase
  abstract: true
  components:
  - type: Sprite
    drawdepth: SmallObjects

- type: entity
  parent: STHunterConsoleBase
  id: STHunterConsoleCrew
  name: hunter health monitor
  description: Used to monitor active health sensors of all Yautja in the system. You can see that the console highlights the human's ship areas with BLUE and the hunting locations with RED.
  components:
  - type: Sprite
    drawdepth: SmallObjects
    sprite: _Stories/Structures/Machinery/hunter_machines.rsi
    state: crew

- type: entity
  parent: STHunterConsoleBase
  id: STHunterConsoleTerminal
  name: control console
  description: A console used by the Hunters.
  components:
  - type: Sprite
    state: terminal

- type: entity
  parent: STHunterConsoleBase
  id: STHunterConsoleOverwatch
  name: ship defenses console
  description: A console used for monitoring the ships defences systems.
  components:
  - type: Sprite
    state: overwatch

- type: entity
  parent: STHunterConsoleBase
  id: STHunterConsoleSmallMonitor
  name: monitor
  components:
  - type: Sprite
    state: smallmonitor

- type: entity
  parent: STHunterMachinesBase
  id: STHunterGlobe
  name: hunter globe
  description: A globe designed by the hunters to show them the location of prey across the hunting grounds.
  components:
  - type: Sprite
    state: globe
