- type: entity
  parent: ColMarTechBase
  id: STVendorTankCrew
  name: ColMarTech Vehicle Crewman Equipment Rack
  description: An automated rack hooked up to a colossal storage of Vehicle Crewmen standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessCrewman" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMVehicleCrewman
    sections:
    - name: Стандартное Оборудование
      takeAll: CMStandard
      entries:
      - id: CMHandsInsulated
      - id: STArmorM3Tanker
      - id: STArmorHelmetM50
      - id: RMCVisorMedical
      - id: STWeldingKit
        replaceSlot: back
      - id: CMMRE
    - name: Персональное Оружие
      choices: { CMWeapon: 1 }
      entries:
      - id: RMCWeaponPistolM77
      - id: RMCMK80
    - name: Пояс
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltUtilityGeneral
      - id: STBeltTank
      - id: CMBeltMarine
        recommended: true
      - id: RMCBeltHolsterPistol
      - id: RMCBeltHolsterSMGPouch
      - id: RMCBeltHolsterM13
      - id: RMCBeltHolsterRevolver
      - id: RMCM82FHolster
      - id: RMCM276ShotgunShellLoadingRig
      - id: CMBeltUtilityFilled
    - name: Подсумки
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (многоразовые инъекторы)
        recommended: true
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (марля, мазь) # TODO RMC14 add 'splints,'
        recommended: true
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки)
        recommended: true
      - id: RMCPouchFlareFilled
