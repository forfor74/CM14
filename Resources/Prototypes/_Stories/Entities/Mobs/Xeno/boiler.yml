- type: entity
  parent: RMCXenoBoilerBase
  id: STXenoBoilerTrapper
  suffix: Trapper
  components:
  - type: Sprite
    sprite: _Stories/Mobs/Xenos/Boiler/trapper_boiler.rsi
    layers:
    - map: [ "enum.XenoVisualLayers.Base" ]
      state: alive
    - map: [ "enum.RMCDamageVisualLayers.Base" ]
      visible: false
    - map: [ "enum.XenoInhandVisualLayers.Left" ]
      visible: false
    - map: [ "enum.XenoInhandVisualLayers.Right" ]
      visible: false
    - map: [ "enum.RMCShieldVisuals.Base" ]
      sprite: _Stories/Effects/xeno_shields.rsi
      visible: false
    - map: [ "enum.XenoAcidAnimationVisualLayers.Base" ]
      state: spit
      visible: false
  - type: Xeno
    role: CMXenoBoiler
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStabBoiler
    - ActionXenoAcidStrong
    - ActionXenoDeployTraps
    - ActionXenoDeployAcidMine
    - ActionXenoAcidShotgun
    - ActionXenoTrapperZoom
    - ActionXenoDevolve
  - type: XenoStrain
    name: stories-xeno-trapper-name
    description: stories-xeno-trapper-description
    popup: stories-xeno-trapper-popup
  - type: MobThresholds
    thresholds:
      0: Alive
      590: Critical
      690: Dead
  - type: XenoScatteredSpit
    plasmaCost: 60
    maxProjectiles: 9
    maxDeviation: 40
    projectileId: XenoAcidShotgunProjectile
  - type: RMCXenoDeployTraps
  - type: RMCXenoDeployAcidMine
  - type: XenoZoom
    zoom: 1.75, 1.75
    offsetLength: 0
    speed: 1
    doAfter: 0
  - type: MovementSpeedModifier
    baseWalkSpeed: 1.66
    baseSprintSpeed: 3
  - type: CMArmor
    xenoArmor: 0
    explosionArmor: 20
  - type: RMCXenoAcidInsight
  - type: RMCXenoBoostOnHit
  - type: XenoDevour
  - type: XenoAcidAnimation
    actionIds:
    - ActionXenoAcidStrong
    - ActionXenoAcidShotgun
  - type: XenoHidden
  - type: RMCActionOrder
    id: STXenoBoilerTrapper
