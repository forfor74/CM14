- type: entity
  parent: RMCBaseWeaponSniperRifle
  id: CMXM43E1SniperRifle
  name: XM43E1 experimental anti-materiel rifle
  description: "An experimental anti-materiel rifle produced by Armat Systems, recently reacquired from the deep storage of an abandoned prototyping facility. This one in particular is currently undergoing field testing. Chambered in 10x99mm Caseless."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Snipers/xm43e1.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Item
    size: Large
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Snipers/xm43e1.rsi
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 12
  - type: Gun
    minAngle: 50
    maxAngle: 50
    fireRate: 0.5
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_sniper.ogg
  - type: RMCSelectiveFire
    recoilWielded: 1
    scatterWielded: 3
    baseFireRate: 0.3
  - type: WieldDelay
    baseDelay: 1.2
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_mar40_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_mar40_unload.ogg
        priority: 2
        whitelist:
          tags:
          - CMMagazineSniperXM43E1
  - type: GunUserWhitelist
    whitelist:
      components:
      - SniperWhitelist
  - type: GunRequiresWield
  - type: Corrodible
    isCorrodible: false
  - type: GunIFF
    enabled: true
  - type: RMCNameItemOnVend
    item: PrimaryGun
  - type: Scope
    zoom: 1.25 # TODO RMC14 2x and 4x zoom
    requireWielding: true
  - type: Construction
    graph: XM43E1SniperRifleConstruct
    node: start

- type: entity
  parent: CMMagazineSniperM96S
  id: CMMagazineSniperXM43E1AntiMateriel
  name: "XM43E1 marksman magazine (10x99mm)"
  description: A magazine of 10x99mm anti-materiel rounds.
  components:
  - type: Tag
    tags:
    - CMMagazineSniper
    - CMMagazineSniperXM43E1
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - CMCartridgeSniper10x99mm
    proto: CMCartridgeSniper10x99mmAntiMateriel
    capacity: 8
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/m42c.rsi
    layers:
    - state: mag-0
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: band_e # TODO RMC14 band non e
      color: "#000000"

- type: entity
  parent: CMCartridgeSniper10x28mm
  id: CMCartridgeSniper10x99mmAntiMateriel
  name: cartridge (10x99mm) (AntiMateriel)
  components:
  - type: Tag
    tags:
    - Cartridge
    - CMCartridgeSniper10x99mm
  - type: CartridgeAmmo
    proto: CMBulletSniper10x99mmAntiMateriel

- type: entity
  parent: CMBulletSniper10x28mm
  id: CMBulletSniper10x99mmAntiMateriel
  name: bullet (10x99mm)
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 225 # TODO RMC14 130 when aimed shot is in please someone help im dying
        Structural: 1500
  - type: CMArmorPiercing
    amount: 50

- type: Tag
  id: CMMagazineSniperXM43E1

- type: Tag
  id: CMCartridgeSniper10x99mm
