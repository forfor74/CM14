  - type: IgnoreArc

  - type: Projectile
    deleteOnCollide: false
    onlyCollideWhenShot: true
    impactEffect: BulletImpactEffect
    damage:
      types:
        Piercing: 0
  - type: IgnorePredictionHide
  - type: SharpFlechetteSpread
    projectileProto: CMPelletShotgunFlechette
    sourceProjectileProto: STBulletSharpFlechette
    projectileDamageMultiplier: 0.6666667
    count: 6
    spreadAngle: 60
    evenSpread: true
    projectileSpeed: 20
    minVelocity: 0.5
    maxVelocity: 1.5
  - type: Fixtures
    fixtures:
      projectile:
        hard: false
        shape: !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        mask:
        - Impassable
        - BulletImpassable

