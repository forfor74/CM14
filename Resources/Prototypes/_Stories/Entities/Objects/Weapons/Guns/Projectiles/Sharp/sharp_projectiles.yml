- type: entity
  id: STBulletSharpStickyExplosive
  parent: BaseBullet
  name: sticky explosive dart
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Guns/Projectiles/Sharp/explosive.rsi
    drawdepth: Overlays
    layers: [ { state: explosive_dart } ]

  - type: IgnoreArc

  - type: EmbeddableProjectile
    sound: /Audio/_Stories/Weapons/spike_hit.ogg
    embedOnThrow: false
    deleteOnRemove: false
    removalTime: null

  - type: Projectile
    deleteOnCollide: false
    onlyCollideWhenShot: true
    impactEffect: BulletImpactEffect
    damage:
      types:
        Piercing: 35
  - type: IgnorePredictionHide

  - type: SharpStickyDart
    mineProto: STSharpMineExplosive
    iffDropProto: STCartridgeSharpExplosive
    shortDelay: 2.5
    longDelay: 5.0
    explosionRadius: 3

  - type: Explosive
    explosionType: RMC
    maxIntensity: 20
    intensitySlope: 6
    totalIntensity: 200
    canCreateVacuum: false

  - type: Fixtures
    fixtures:
      projectile:
        hard: false
        shape: !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        mask:
        - Impassable
        - BulletImpassable

