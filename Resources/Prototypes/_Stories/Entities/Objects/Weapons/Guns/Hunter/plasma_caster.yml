- type: entity
  parent: STHunterBaseItem
  id: STWeaponPlasmaCaster
  abstract: true
  name: plasma caster
  description: A powerful, shoulder-mounted energy weapon. Requires a linked bracer to function.
  components:
  - type: Tag
    tags:
    - STPredatorGear
  - type: Item
    size: Large
  - type: Gun
    fireRate: 1.67
    soundGunshot: /Audio/_Stories/Weapons/pred_plasmacaster_fire.ogg
  - type: BasicEntityAmmoProvider
    proto: STPlasmaBoltStunProjectile
    capacity: 1
    count: 1
  - type: PlasmaCaster

- type: entity
  parent: STWeaponPlasmaCaster
  id: STWeaponPlasmaCasterEbony
  components:
