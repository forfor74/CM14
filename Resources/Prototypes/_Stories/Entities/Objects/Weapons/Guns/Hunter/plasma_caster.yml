- type: entity
  id: STPlasmaBoltBaseProjectile
  parent: BaseBullet
  abstract: true
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Ammunition/Projectiles/ion_projectiles.rsi
    layers:
    - state: bullet
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
        restitution: 0.0
        density: 20
  - type: Projectile
    damage:
      types:
        Heat: 0
  - type: Ammo

- type: entity
  parent: STPlasmaBoltBaseProjectile
  id: STPlasmaBoltStunProjectile
  name: stun bolt
  components:
  - type: Projectile
    damage:
      types:
        Shock: 5
  - type: HunterStunBolt
    stunTime: 4

- type: entity
  parent: STPlasmaBoltBaseProjectile
  id: STPlasmaBoltImmobilizerProjectile
  name: plasma immobilizer
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Ammunition/Projectiles/bluespace_projectiles.rsi
    layers:
    - state: bullet
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Projectile
    damage:
      types:
        Shock: 0
  - type: HunterAreaStunOnHit
    radius: 7
    stunTime: 6
    hunterReductionTime: 2
  - type: TriggerOnCollide
    fixtureID: projectile

- type: entity
  parent: STPlasmaBoltBaseProjectile
  id: STPlasmaBoltLethalProjectile
  name: plasma bolt
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Ammunition/Projectiles/pulse_projectiles.rsi
    layers:
    - state: bullet
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Projectile
    damage:
      types:
        Heat: 75
  - type: ExplodeOnTrigger
  - type: TriggerOnCollide
    fixtureID: projectile
  - type: Explosive
    explosionType: RMC
    totalIntensity: 60
    intensitySlope: 20
    maxIntensity: 40
  - type: CMExplosionEffect
  - type: RMCScorchEffect

- type: entity
  parent: STPlasmaBoltBaseProjectile
  id: STPlasmaBoltOverchargeProjectile
  name: plasma eradicator
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Ammunition/Projectiles/bluespace_projectiles.rsi
    layers:
    - state: bullet
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Projectile
    damage:
      types:
        Heat: 55
        Structural: 100
  - type: ExplodeOnTrigger
  - type: TriggerOnCollide
    fixtureID: projectile
  - type: Explosive
    explosionType: RMC
    totalIntensity: 800
    intensitySlope: 40
    maxIntensity: 170
  - type: CMExplosionEffect
  - type: RMCScorchEffect
