- type: entity
  parent: CMBaseWeaponSMG
  name: M63B/2 submachine gun
  id: WeaponSMGM39B2
  description: A modified version Aegis Battlefield Armaments M-63 submachinegun, re-engineered for better weight, handling and accuracy. Given only to elite units.
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Guns/SMGs/m39b2.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _Stories/Objects/Weapons/Guns/SMGs/m39b2.rsi
  - type: Gun
    shotsPerBurst: 3
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_m63.ogg
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    - FullAuto
    recoilWielded: 0.1
    recoilUnwielded: 3
    scatterWielded: 4
    scatterUnwielded: 11
    baseFireRate: 7.68
    burstScatterMult: 1
    modifiers:
      Burst:
        fireDelay: 0.0999
        maxScatterModifier: 10
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
      FullAuto:
        maxScatterModifier: 3
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 4
  - type: GunDamageModifier
    multiplier: 1.35
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - CMMagazineSMGM63
          - CMMagazineSMGM63AP
          - CMMagazineSMGM63Ext
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentBarrelCharger
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentRecoilCompensator
          - RMCAttachmentSuppressor
          - RMCM5Bayonet
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentMagneticHarness
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS6ReflexSight
          - RMCAttachmentS42xTelescopicMiniscope
      rmc-aslot-stock:
        startingAttachable: RMCAttachmentM63StockCollapsible
        whitelist:
          tags:
          - RMCAttachmentM63ArmBrace
          - RMCAttachmentM63Stock
          - RMCAttachmentM63StockCollapsible
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentAngledGrip
          - RMCAttachmentFlashlightGrip
          - RMCAttachmentGyroscopicStabilizer
          - RMCAttachmentLaserSight
          - RMCAttachmentVerticalGrip
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.715, 0.092
      rmc-aslot-rail: 0.032, 0.155
      rmc-aslot-stock: -0.81, 0.032
      rmc-aslot-underbarrel: 0.25, -0.25

