- type: entity
  parent: RMCBaseWeaponSniperRifle
  id: CMM42CSniperRifle
  name: M42C Anti-Tank rifle
  description: A high power sniper rifle, this weapon deals immense damage per bullet and is capable of attacking and hitting targets at extreme ranges. It comes equipped with a high power scope allowing the user a wide range of vision. This weapon is limited to six supersonic rifle rounds per magazine, combined with a slow rate of fire, a very obvious and loud firing noise and the fact that it is ineffective in close range combat as bullets fired too close to the user will miss. However, despite these drawbacks, the M42C is an exceptionally effective weapon when properly utilized. It is the standard sniper rifle for Corporate PMC snipers.
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Guns/Snipers/m42c.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Item
    size: Large
  - type: Clothing
    sprite: _Stories/Objects/Weapons/Guns/Snipers/m42c.rsi
  - type: Gun
    shotsPerBurst: 1
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_sniper.ogg
  - type: RMCSelectiveFire
    recoilWielded: 1
    scatterWielded: 0
    baseFireRate: 0.667
  - type: WieldDelay
    baseDelay: 1.2
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - CMMagazineSniperM42C
  - type: GunRequiresWield
  - type: Corrodible
    isCorrodible: false
  - type: GunIFF
  - type: AttachableHolder
    slots:
      rmc-aslot-rail:
        locked: true
        startingAttachable: RMCM96SIntegratedScope
        whitelist:
          tags:
          - RMCM96SIntegratedScope
