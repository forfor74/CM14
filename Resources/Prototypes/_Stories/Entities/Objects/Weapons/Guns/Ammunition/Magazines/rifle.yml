# M4SPR A19 HV Incendiary
- type: entity
  parent: CMMagazineRifleBase
  id: RMCMagazineRifleM4SPRA19Incendiary
  name: "M4SPR A19 magazine (incendiary)"
  description: "A magazine of incendiary A19 rounds for use in the M4SPR battle rifle."
  components:
  - type: Tag
    tags:
    - CMMagazineRifle
    - RMCMagazineRifleM4SPRA19
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridgeRifleM4SPRA19
    proto: RMCCartridgeRifleM4SPRA19Incendiary
    capacity: 18
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/m4spr.rsi

