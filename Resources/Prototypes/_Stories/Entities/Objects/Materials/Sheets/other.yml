    state: copper
    sprite: _Stories/Objects/Materials/Sheets/copper.rsi
  - type: Item
    heldPrefix: copper
    size: Normal
    sprite: _Stories/Objects/Materials/Sheets/copper.rsi
  - type: Appearance
  - type: Extractable
    grindableSolutionName: copper
  - type: SolutionContainerManager
    solutions:
      copper:
        reagents:
        - ReagentId: RMCCopper
          Quantity: 10
  - type: Tag
    tags:
    - Sheet

