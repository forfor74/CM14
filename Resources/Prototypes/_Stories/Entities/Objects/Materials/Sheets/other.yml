# Copper
- type: material
  id: STCopper
  stackEntity: STSheetCopper
  name: materials-copper
  icon: { sprite: _Stories/Objects/Materials/Sheets/copper.rsi, state: copper }
  color: "#A8A8A8"
  price: 0.0053

- type: stack
  id: STCopper
  name: copper
  icon: { sprite: _Stories/Objects/Materials/Sheets/copper.rsi, state: copper }
  spawn: STSheetCopper
  maxCount: 50

- type: entity
  parent: SheetOtherBase
  id: STSheetCopper
  name: copper
  suffix: Full
  components:
  - type: Material
  - type: Stack
    stackType: STCopper
    count: 50
